version: 2

models:
  - name: eco_dim_promotional_campaign
    description: "Eco Essentials Promotional Campaign Dimension"
  - name: eco_dim_customer
    description: "Eco Essentials Customer Dimension"
  - name: eco_dim_date
    description: "Eco Essentials Date Dimension"
  - name: eco_dim_email
    description: "Eco Essentials Email Dimension"
  - name: eco_dim_event
    description: "Eco Essentials Event Dimension"
  - name: eco_dim_product
    description: "Eco Essentials Product Dimension"
  - name: eco_dim_time
    description: "Eco Essentials Time Dimension"
  - name: eco_fact_marketing
    description: |
      Eco Essentials Marketing Fact.
      The grain of this table is one marketing email event per customer per timestamp.
  - name: eco_fact_sales
    description: |
      Eco Essentials Sales Fact.
      The grain of this table is one sale of a product to a customer
      Each record represents a sale to a customer.
